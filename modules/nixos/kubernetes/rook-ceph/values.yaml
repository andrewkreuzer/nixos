cephFileSystems: []

cephClusterSpec:
  cleanupPolicy:
    wipeDevicesFromOtherClusters: true
  dashboard:
    ssl: false
  storage:
    useAllNodes: false
    useAllDevices: false
    nodes:
      - name: k8s-day
        devices:
          - name: "vdb"
      - name: k8s-goode
        devices:
          - name: "vdb"
      - name: k8s-montgomery
        devices:
          - name: "vdb"
          - name: "vdc"
            config:
              deviceClass: "s3"
  resources:
    mgr:
      limits:
        memory: "768Mi"
      requests:
        memory: "768Mi"
    mon:
      limits:
        memory: "768Mi"
      requests:
        memory: "768Mi"
    osd:
      limits:
        memory: "4Gi"
      requests:
        memory: "4Gi"
